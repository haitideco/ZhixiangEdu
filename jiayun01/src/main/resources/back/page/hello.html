<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎页面 - 潮汐健身房管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: #f3f4f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .welcome-container {
            background: #fff;
            border-radius: 8px;
            padding: 60px 100px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .welcome-title {
            font-size: 32px;
            color: #333;
            margin-bottom: 16px;
            font-weight: 600;
        }
        .system-name {
            font-size: 24px;
            color: #00FA9A;
            margin-bottom: 30px;
            font-weight: 500;
        }
        .divider {
            width: 60px;
            height: 3px;
            background: #00FA9A;
            margin: 0 auto 30px;
            border-radius: 2px;
        }
        .welcome-text {
            font-size: 16px;
            color: #666;
            line-height: 2;
            margin-bottom: 40px;
        }
        .footer-info {
            padding-top: 30px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 14px;
        }
        .footer-info p {
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <h1 class="welcome-title">欢迎使用</h1>
        <div class="system-name">潮汐健身房管理系统</div>
        <div class="divider"></div>
        <p class="welcome-text">
            本系统为健身房提供一站式管理解决方案<br>
            涵盖会员管理、课程排期、教练管理、商品销售等核心功能<br>
            助力健身房高效运营
        </p>
        <div class="footer-info">
            <p>当前版本：V1.0.0</p>
            <p>技术支持：潮汐科技</p>
        </div>
    </div>
</body>
</html>
